<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Biolume Pulse Totem</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#08120d;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.stage{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;flex:none}</style></head><body><div class="stage"><canvas id="c" width="720" height="720"></canvas></div><script>const cv=document.getElementById('c'),ctx=cv.getContext('2d');const PX=20,GW=36,GH=36;const P={bg:'#08120d',bg2:'#112118',leaf:'#123524',green:'#2C8F6A',bio:'#75F7C7',core:'#F5FFB2',ring:'#B9FFF1'};function px(x,y,c,a=1){ctx.globalAlpha=a;ctx.fillStyle=c;ctx.fillRect(Math.round(x)*PX,Math.round(y)*PX,PX,PX);ctx.globalAlpha=1}function glow(x,y,r,c,a){ctx.globalAlpha=a;ctx.fillStyle=c;ctx.beginPath();ctx.arc(x*PX+10,y*PX+10,r*PX,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}const SUN=[[0,0,0,0,2,0,2,0,0,0,0,0],[0,0,0,2,0,3,3,0,2,0,0,0],[0,0,2,0,3,4,4,3,0,2,0,0],[0,2,0,3,4,4,4,4,3,0,2,0],[2,0,3,4,4,3,3,4,4,3,0,2],[0,3,4,4,3,2,2,3,4,4,3,0],[2,3,4,3,2,1,1,2,3,4,3,2],[0,3,4,4,3,2,2,3,4,4,3,0],[2,0,3,4,4,3,3,4,4,3,0,2],[0,2,0,3,4,4,4,4,3,0,2,0],[0,0,2,0,3,4,4,3,0,2,0,0],[0,0,0,2,0,3,3,0,2,0,0,0],[0,0,0,0,2,0,2,0,0,0,0,0]];const pal={1:P.leaf,2:P.green,3:P.bio,4:P.core};function drawSun(ox,oy){for(let r=0;r<SUN.length;r++)for(let c=0;c<SUN[r].length;c++){const v=SUN[r][c];if(v)px(ox+c,oy+r,pal[v])}}const FPS=30,DUR=5,TOTAL=FPS*DUR;function render(f){const t=f/TOTAL;ctx.fillStyle=P.bg;ctx.fillRect(0,0,720,720);for(let y=0;y<GH;y++)for(let x=0;x<GW;x++)if((x+y)%2===0)px(x,y,P.bg2,0.12);const pulse=(Math.sin(t*Math.PI*4)+1)/2;for(let i=0;i<10;i++){const a=(0.02+0.045*pulse)*(1-i*0.08);glow(18,18,2.2+i*0.95,i%2?P.bio:P.ring,a)}// outward radio rings
for(let ring=0;ring<4;ring++){const rr=5+ring*4+((f*0.12+ring*2)%4);for(let ang=0;ang<360;ang+=18){const rad=ang*Math.PI/180;const x=18+Math.cos(rad)*rr;const y=18+Math.sin(rad)*rr;px(x,y,ring%2?P.ring:P.bio,0.18+0.08*pulse)}}// background tendrils / organic broadcast texture
for(let i=0;i<8;i++){const x=4+i*4+Math.sin(f*0.03+i)*1.2;for(let y=5;y<31;y+=5)px(x,y,i%2?P.green:P.leaf,0.14)}drawSun(12,12);glow(18,18,3.6,P.core,0.05+0.05*pulse)}function fitCanvas(){const s=Math.max(1,Math.floor(Math.min(window.innerWidth/720,window.innerHeight/720)));cv.style.width=`${720*s}px`;cv.style.height=`${720*s}px`}window.addEventListener('resize',fitCanvas);fitCanvas();let st=null;function loop(ts){if(!st)st=ts;const el=(ts-st)/1000,lt=el%DUR,f=Math.floor(lt*FPS);render(f);requestAnimationFrame(loop)}requestAnimationFrame(loop);</script></body></html>
