<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Glow Panel Drifter</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#08131a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.stage{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;flex:none}</style></head><body><div class="stage"><canvas id="c" width="720" height="720"></canvas></div><script>const cv=document.getElementById('c'),ctx=cv.getContext('2d');const PX=20,GW=36,GH=36;const P={bg:'#08131a',bg2:'#0c2028',glow:'#67C7C9',glow2:'#B9F0EC',edge:'#2E6E73',dark:'#0B1E24'};function px(x,y,c,a=1){ctx.globalAlpha=a;ctx.fillStyle=c;ctx.fillRect(Math.round(x)*PX,Math.round(y)*PX,PX,PX);ctx.globalAlpha=1}const SPR=[[0,0,0,2,2,2,2,2,2,0,0,0],[0,0,2,3,3,3,3,3,3,2,0,0],[0,2,3,2,2,2,2,2,2,3,2,0],[2,3,2,1,1,2,2,1,1,2,3,2],[2,3,2,1,3,2,2,3,1,2,3,2],[2,3,2,2,2,4,4,2,2,2,3,2],[2,3,2,2,4,3,3,4,2,2,3,2],[2,3,2,2,4,3,3,4,2,2,3,2],[2,3,2,2,2,4,4,2,2,2,3,2],[2,3,2,1,3,2,2,3,1,2,3,2],[2,3,2,1,1,2,2,1,1,2,3,2],[0,2,3,2,2,2,2,2,2,3,2,0],[0,0,2,3,3,3,3,3,3,2,0,0],[0,0,0,2,2,2,2,2,2,0,0,0]];const pal={1:P.dark,2:P.glow,3:P.glow2,4:P.edge};function drawSprite(ox,oy){for(let r=0;r<14;r++)for(let c=0;c<12;c++){const v=SPR[r][c];if(v)px(ox+c,oy+r,pal[v])}}function glow(x,y,r,c,a){ctx.globalAlpha=a;ctx.fillStyle=c;ctx.beginPath();ctx.arc(x*PX+10,y*PX+10,r*PX,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}const FPS=30,DUR=6,TOTAL=FPS*DUR;function render(f){const t=f/TOTAL;ctx.fillStyle=P.bg;ctx.fillRect(0,0,720,720);for(let y=0;y<GH;y++)for(let x=0;x<GW;x++)if((x+y)%2===0)px(x,y,P.bg2,0.18);for(let i=0;i<8;i++){const y=5+i*3;for(let x=0;x<36;x+=2)px(x+Math.sin(f*0.03+y)*1.2,y,P.edge,0.2)}const x=12+Math.sin(t*Math.PI*2)*1.8;const y=11+Math.sin(t*Math.PI*4)*0.8;glow(x+6,y+7,4.5,P.glow,0.06);drawSprite(x,y);for(let i=0;i<4;i++)px(x+3+i*2,y+3+(i%2),P.glow2,0.7)}function fitCanvas(){const s=Math.max(1,Math.floor(Math.min(window.innerWidth/720,window.innerHeight/720)));cv.style.width=`${720*s}px`;cv.style.height=`${720*s}px`}window.addEventListener('resize',fitCanvas);fitCanvas();let st=null;function loop(ts){if(!st)st=ts;const el=(ts-st)/1000,lt=el%DUR,f=Math.floor(lt*FPS);render(f);requestAnimationFrame(loop)}requestAnimationFrame(loop);</script></body></html>
