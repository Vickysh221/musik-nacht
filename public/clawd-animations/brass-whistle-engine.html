<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Brass Whistle Engine</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0b0d11;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}.stage{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;flex:none}</style></head><body><div class="stage"><canvas id="c" width="720" height="720"></canvas></div><script>const cv=document.getElementById('c'),ctx=cv.getContext('2d');const PX=20,GW=36,GH=36;const P={bg:'#0b0d11',bg2:'#171b20',brass:'#B7864B',brass2:'#D8B176',rust:'#4E3A24',steel:'#6F7E8A',whistle:'#F7D37E'};function px(x,y,c,a=1){ctx.globalAlpha=a;ctx.fillStyle=c;ctx.fillRect(Math.round(x)*PX,Math.round(y)*PX,PX,PX);ctx.globalAlpha=1}const SPR=[[0,0,0,2,2,2,0,0,0,0,0,0],[0,0,2,3,3,3,2,0,0,4,0,0],[0,2,3,1,1,3,2,2,4,4,4,0],[2,3,1,1,2,3,3,2,0,4,0,0],[0,2,3,2,2,2,3,2,0,0,0,0],[0,0,2,3,1,3,2,0,0,0,0,0],[0,2,3,3,2,3,3,2,0,0,0,0],[2,3,1,3,2,2,3,3,2,0,0,0],[0,2,3,2,2,2,3,2,0,0,0,0],[0,0,2,3,1,3,2,0,0,0,0,0],[0,0,0,2,2,2,0,0,0,0,0,0],[0,0,0,2,0,2,0,0,0,0,0,0],[0,0,2,0,0,0,2,0,0,0,0,0],[0,2,0,0,0,0,0,2,0,0,0,0]];const pal={1:P.rust,2:P.brass,3:P.brass2,4:P.steel};function drawSprite(ox,oy){for(let r=0;r<14;r++)for(let c=0;c<12;c++){const v=SPR[r][c];if(v)px(ox+c,oy+r,pal[v])}}const FPS=30,DUR=5,TOTAL=FPS*DUR;function render(f){const t=f/TOTAL;ctx.fillStyle=P.bg;ctx.fillRect(0,0,720,720);for(let y=0;y<GH;y++)for(let x=0;x<GW;x++)if((x+y)%2===0)px(x,y,P.bg2,0.12);for(let i=0;i<6;i++){for(let y=10+i*3;y<30;y+=6)px(6+i*4,y,P.steel,0.14)}const bob=Math.sin(t*Math.PI*4)*0.7;const lean=t<0.25?0:t<0.5?1:t<0.75?0:-1;drawSprite(12+lean,11+bob);if(f%20<7){px(22,14,P.whistle,0.8);px(23,14,P.whistle,0.5)}for(let i=0;i<3;i++)px(24+i,14-i,P.whistle,0.25)}</script><script>function fitCanvas(){const s=Math.max(1,Math.floor(Math.min(window.innerWidth/720,window.innerHeight/720)));cv.style.width=`${720*s}px`;cv.style.height=`${720*s}px`}window.addEventListener('resize',fitCanvas);fitCanvas();let st=null;function loop(ts){if(!st)st=ts;const el=(ts-st)/1000,lt=el%DUR,f=Math.floor(lt*FPS);render(f);requestAnimationFrame(loop)}requestAnimationFrame(loop);</script></body></html>
