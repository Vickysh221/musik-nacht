    #progress { height: 100%; background: #ff6644; border-radius: 2px; width: 0%; }

    class MVStage {
      constructor(config) {
        this.config = config;
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000000);
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.camera.position.z = 5;

        this.renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(this.renderer.domElement);

        this.clock = new THREE.Clock();
        this.isPlaying = false;
        this.currentTime = 0;
        this.phaseEntities = {};

        this.init();
        this.setupUI();
      }

      init() {
        this.setupLighting();
        this.setupGhost();
        this.config.phases.forEach((phase, idx) => this.setupPhase(phase, idx));
        window.addEventListener('resize', () => this.onWindowResize());
        this.animate();
      }

      setupLighting() {
        this.ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        this.scene.add(this.ambientLight);
        this.directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        this.directionalLight.position.set(2, 2, 2);
        this.scene.add(this.directionalLight);
        this.pointLight = new THREE.PointLight(0xffcc99, 0.6);
        this.pointLight.position.set(0.5, 1, 0);
        this.scene.add(this.pointLight);
      }

      setupGhost() {
        const charCfg = this.config.character || {};
        const spriteAspect = charCfg.width && charCfg.height ? charCfg.width / charCfg.height : 0.9;
        const ghostGeometry = new THREE.PlaneGeometry(2 * spriteAspect, 2.2);
        const ghostMaterial = new THREE.MeshStandardMaterial({
          color: 0xffffff,
          transparent: true,
          emissive: 0xaa6644,
          emissiveIntensity: 0.4,
          metalness: 0,
          roughness: 1.0
        });

        this.ghostMesh = new THREE.Mesh(ghostGeometry, ghostMaterial);
        this.ghostMesh.position.set(0, 0, 0);
        this.scene.add(this.ghostMesh);

        if (charCfg.type === 'pixel-character-json' && charCfg.data && charCfg.palette) {
          this.createPixelCharacterTexture(charCfg);
        } else {
          this.loadGhostTexture();
        }
      }

      createPixelCharacterTexture(charCfg) {
        const scale = 8;
        const width = charCfg.width || 16;
        const height = charCfg.height || 16;
        const canvas = document.createElement('canvas');
        canvas.width = width * scale;
        canvas.height = height * scale;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        for (let y = 0; y < charCfg.data.length; y++) {
          for (let x = 0; x < charCfg.data[y].length; x++) {
            const value = charCfg.data[y][x];
            if (!value) continue;
            const color = charCfg.palette[String(value)] || charCfg.palette[value];
            if (!color) continue;
            ctx.fillStyle = color;
            ctx.fillRect(x * scale, y * scale, scale, scale);
          }
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.magFilter = THREE.NearestFilter;
        texture.minFilter = THREE.NearestFilter;
        texture.generateMipmaps = false;
        this.ghostMesh.material.map = texture;
        this.ghostMesh.material.needsUpdate = true;
      }

      loadGhostTexture() {
        const textureLoader = new THREE.TextureLoader();
        const paths = ['ghost-72x80.png', './ghost-72x80.png', '../ghost-72x80.png', '/ghost-72x80.png'];
        const tryLoad = (index) => {
          if (index >= paths.length) {
            this.createGhostPlaceholder();
            return;
          }
          textureLoader.load(paths[index], (texture) => {
            texture.magFilter = THREE.NearestFilter;
            texture.minFilter = THREE.NearestFilter;
            this.ghostMesh.material.map = texture;
            this.ghostMesh.material.needsUpdate = true;
          }, undefined, () => tryLoad(index + 1));
        };
        tryLoad(0);
      }

      createGhostPlaceholder() {
        const canvas = document.createElement('canvas');
        canvas.width = 72; canvas.height = 80;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#D85A30';
        ctx.beginPath();
        ctx.moveTo(36, 10);
        ctx.bezierCurveTo(50, 10, 60, 20, 60, 35);
        ctx.lineTo(60, 70); ctx.lineTo(12, 70); ctx.lineTo(12, 35);
        ctx.bezierCurveTo(12, 20, 22, 10, 36, 10); ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.fillRect(25, 25, 6, 8); ctx.fillRect(41, 25, 6, 8); ctx.fillRect(28, 40, 16, 4);
        const texture = new THREE.CanvasTexture(canvas);
        texture.magFilter = THREE.NearestFilter;
        texture.minFilter = THREE.NearestFilter;
        this.ghostMesh.material.map = texture;
        this.ghostMesh.material.needsUpdate = true;
      }

      setupPhase(phase, idx) {
        const phaseEntity = { phase, meshes: [], lights: [] };
        if (phase.scene.type === 'simple') this.createSimpleScene(phase, phaseEntity);
        else if (phase.scene.type === 'raymarching') this.createRaymarchScene(phase, phaseEntity);
        this.phaseEntities[phase.id] = phaseEntity;
      }

      createSimpleScene(phase, entity) {
        const size = phase.scene.size || { w: 2, h: 1.5, d: 3 };
        const geometry = new THREE.BoxGeometry(size.w, size.h, size.d);
        const material = new THREE.MeshStandardMaterial({ color: new THREE.Color(phase.scene.baseColor || 0x1a1a1a), side: THREE.BackSide });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.z = -1.5; mesh.visible = false;
        this.scene.add(mesh); entity.meshes.push(mesh);
      }

      createRaymarchScene(phase, entity) {
        const geometry = new THREE.PlaneGeometry(8, 6);
        const material = new THREE.ShaderMaterial({
          uniforms: { iTime: { value: 0 }, iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) } },
          vertexShader: 'void main() { gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }',
          fragmentShader: 'uniform float iTime; uniform vec2 iResolution; void main() { vec2 uv = gl_FragCoord.xy / iResolution.xy; vec3 col = vec3(0.08 + 0.1 * sin(iTime + uv.x * 3.14), 0.1, 0.14 + uv.y * 0.04); gl_FragColor = vec4(col, 1.0); }'
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.z = -5; mesh.visible = false;
        this.scene.add(mesh); entity.meshes.push(mesh);
      }

      setupUI() {
        document.getElementById('playBtn').addEventListener('click', () => this.togglePlay());
        document.getElementById('timeline').addEventListener('click', (e) => this.seekTimeline(e));
      }

      togglePlay() {
        this.isPlaying = !this.isPlaying;
        document.getElementById('playBtn').textContent = this.isPlaying ? '暂停' : '播放';
      }

      seekTimeline(e) {
        const timeline = document.getElementById('timeline');
        const rect = timeline.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        this.currentTime = ratio * this.config.duration;
      }

      update() {
        if (this.isPlaying) {
          const deltaTime = this.clock.getDelta();
          this.currentTime += deltaTime;
          if (this.currentTime > this.config.duration) this.currentTime = 0;
        }
        this.updatePhases();
        this.updateUI();
      }

      updatePhases() {
        Object.values(this.phaseEntities).forEach(entity => {
          const phase = entity.phase;
          const isActive = this.currentTime >= phase.start && this.currentTime < phase.end;
          entity.meshes.forEach(mesh => { mesh.visible = isActive; });
          if (isActive) this.updateGhostForPhase(phase, this.currentTime - phase.start);
        });
      }

      updateGhostForPhase(phase, phaseTime) {
        this.ghostMesh.position.copy(new THREE.Vector3(...phase.ghost.position));
        this.ghostMesh.material.emissive.setHex(phase.ghost.emissive || 0xaa6644);
        const lighting = phase.lighting;
        this.ambientLight.intensity = lighting.ambientIntensity || 0.3;
        this.ambientLight.color.setHex(lighting.ambient || 0xffffff);
        this.pointLight.intensity = lighting.primaryIntensity || 0.6;
        this.pointLight.color.setHex(lighting.primary || 0xffffff);
      }

      updateUI() {
        document.getElementById('progress').style.width = ((this.currentTime / this.config.duration) * 100) + '%';
        document.getElementById('time').textContent = this.currentTime.toFixed(1) + 's';
      }

      animate() {
        requestAnimationFrame(() => this.animate());
        this.update();
        this.renderer.render(this.scene, this.camera);
      }

      onWindowResize() {
        const width = window.innerWidth, height = window.innerHeight;
        this.camera.aspect = width / height;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(width, height);
      }
    }

    window.addEventListener('DOMContentLoaded', () => { new MVStage(CONFIG); });
